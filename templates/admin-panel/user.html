{% extends 'layouts/admin-layout.html' %} {% block content %}
<main>
  <div class="card">
    <h1 style="display: inline">User FORM</h1>
    <div class="divider"></div>
    <form method="POST" class="form">
      {% csrf_token %}
      <p>
        {% comment %} <label for="title">Title:</label>
        <input
          type="title"
          name="title"
          id="title"
          value="{{category.title}}"
        /> {% endcomment %}
      </p>

      <p>
        {% comment %} <label for="id_status">Status:</label>
        <select name="status" id="id_status">
          <option value="1" {% if category.status == 1 %}selected{% endif %} >Active</option>
          <option value="0"{% if category.status != 1 %}selected{% endif %}>InActive</option>
        </select> {% endcomment %}
      </p>

      <div class="btn-box">
        <button type="button" class="btn secondary" onclick="history.back()">Cancel</button>
        <span>&nbsp;</span>
        <button type="Submit" class="btn primary">
          <i class="fa-solid fa-floppy-disk"></i> Submit
        </button>
      </div>
    </form>
  </div>
</main>
{% endblock content %}
