services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: /app/deploy/entrypoint-web.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
